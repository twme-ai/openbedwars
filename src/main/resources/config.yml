default-locale: en_US
fallback-locale: en_US
minimum-players: 2
countdown-seconds: 20
respawn-seconds: 5
respawn-protection-seconds: 3
ending-seconds: 10
reconnect-grace-seconds: 120

# Hypixel applies a half-second item cooldown and Slowness IV after a throw.
fireballs:
  cooldown-ticks: 10
  slowness-amplifier: 3

progression:
  experience-per-minute: 25
  win-bonus-experience: 100

party:
  max-size: 4
  invite-expiration-seconds: 60

# Hypixel-style default event schedule. Values are elapsed game seconds.
events:
  diamond-ii: 360
  emerald-ii: 720
  diamond-iii: 1080
  emerald-iii: 1440
  bed-destruction: 1800
  sudden-death: 2400
  game-end: 3000

generator-periods:
  iron: 1.0
  gold: 4.0
  diamond:
    tier-1: 30.0
    tier-2: 23.0
    tier-3: 12.0
  emerald:
    tier-1: 65.0
    tier-2: 50.0
    tier-3: 35.0

generator-displays:
  enabled: true
  item-height: 1.35
  text-height: 2.35

generator-splitting:
  enabled: true
  radius: 3.0
  resources:
    - iron
    - gold
