default-locale: en_US
fallback-locale: en_US
minimum-players: 2
countdown-seconds: 20
respawn-seconds: 5
ending-seconds: 10

progression:
  experience-per-minute: 25
  win-bonus-experience: 100

# Hypixel-style default event schedule. Values are elapsed game seconds.
events:
  diamond-ii: 360
  emerald-ii: 720
  diamond-iii: 1080
  emerald-iii: 1440
  bed-destruction: 1800
  sudden-death: 2400
  game-end: 3000

generator-periods:
  iron: 1.0
  gold: 4.0
  diamond:
    tier-1: 30.0
    tier-2: 23.0
    tier-3: 12.0
  emerald:
    tier-1: 65.0
    tier-2: 50.0
    tier-3: 35.0
